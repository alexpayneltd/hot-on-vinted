</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
      <img src="/logo.png" alt="Hot on Vinted" style="height:40px;width:40px;border-radius:50%;object-fit:cover;flex-shrink:0;">
      <span style="font-size:1.2rem;font-weight:800;letter-spacing:-0.5px;color:#1a1a1a;">Hot on <span style="color:#09b1ba;">Vinted</span> UK</span>
    </a>
    <div class="chips-header">
      <div class="chips" id="chips">
        <a href="/most-liked-nike-vinted-uk" class="chip" data-q="Nike">Nike</a>
        <a href="/most-liked-zara-vinted-uk" class="chip" data-q="Zara">Zara</a>
        <a href="/most-liked-lululemon-vinted-uk" class="chip" data-q="Lululemon">Lululemon</a>
        <a href="/most-liked-north-face-vinted-uk" class="chip" data-q="North Face">North Face</a>
        <a href="/most-liked-asos-vinted-uk" class="chip" data-q="ASOS">ASOS</a>
        <a href="/most-liked-hm-vinted-uk" class="chip" data-q="H&M">H&amp;M</a>
        <a href="/most-liked-adidas-vinted-uk" class="chip" data-q="Adidas">Adidas</a>
        <a href="/most-liked-vintage-vinted-uk" class="chip" data-q="Vintage">Vintage</a>
        <a href="/most-liked-levis-vinted-uk" class="chip" data-q="Levi's">Levi's</a>
        <a href="/most-liked-topshop-vinted-uk" class="chip" data-q="Topshop">Topshop</a>
        <a href="/most-liked-new-balance-vinted-uk" class="chip" data-q="New Balance">New Balance</a>
        <a href="/most-liked-gymshark-vinted-uk" class="chip" data-q="Gymshark">Gymshark</a>
      </div>
    </div>
    <button class="burger-btn" id="burger-btn" aria-label="Browse brands">☰</button>
  </div>
  <div class="chips-mobile" id="chips-mobile">
    <a href="/most-liked-zara-vinted-uk" class="chip" data-q="Zara">Zara</a>
    <a href="/most-liked-hm-vinted-uk" class="chip" data-q="H&M">H&amp;M</a>
    <a href="/most-liked-nike-vinted-uk" class="chip" data-q="Nike">Nike</a>
    <a href="/most-liked-asos-vinted-uk" class="chip" data-q="ASOS">ASOS</a>
    <a href="/most-liked-levis-vinted-uk" class="chip" data-q="Levi's">Levi's</a>
    <a href="/most-liked-adidas-vinted-uk" class="chip" data-q="Adidas">Adidas</a>
    <a href="/most-liked-vintage-vinted-uk" class="chip" data-q="Vintage">Vintage</a>
    <a href="/most-liked-topshop-vinted-uk" class="chip" data-q="Topshop">Topshop</a>
    <a href="/most-liked-gymshark-vinted-uk" class="chip" data-q="Gymshark">Gymshark</a>
    <a href="/most-liked-lululemon-vinted-uk" class="chip" data-q="Lululemon">Lululemon</a>
    <a href="/most-liked-north-face-vinted-uk" class="chip" data-q="North Face">North Face</a>
    <a href="/most-liked-new-balance-vinted-uk" class="chip" data-q="New Balance">New Balance</a>
  </div>
</header>

<div class="search-section">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Search any brand, item or category…" autocomplete="off">
  </div>
</div>

<div class="status-bar">
  <span class="status-text" id="status-text">Loading…</span>
</div>

<main class="grid-wrap">
  <div class="grid" id="grid"></div>
</main>

<div class="grid-wrap" style="margin-top:0">
  <div class="grid" id="grid2"></div>
</div>


<footer>
  <span>🔥 Hot on Vinted — not affiliated with Vinted UAB</span>
  <span style="display:flex;gap:16px;align-items:center;">
    <a href="/privacy" style="color:inherit;text-decoration:underline;">Privacy Policy</a>
    <span id="footer-updated"></span>
  </span>
</footer>

<script>
  // Burger menu toggle
  const burgerBtn = document.getElementById('burger-btn');
  const chipsMobile = document.getElementById('chips-mobile');
  burgerBtn.addEventListener('click', () => chipsMobile.classList.toggle('open'));
  chipsMobile.addEventListener('click', e => {
    if (e.target.classList.contains('chip')) chipsMobile.classList.remove('open');
  });
  document.addEventListener('click', e => {
    if (!burgerBtn.contains(e.target) && !chipsMobile.contains(e.target)) {
      chipsMobile.classList.remove('open');
    }
  });

  let homeItems = [];
  let currentTerm = '';
  let searchTimer;
  let activeSearch = null;

  async function loadListings() {
    const grid = document.getElementById('grid');
    const grid2 = document.getElementById('grid2');
    const status = document.getElementById('status-text');
    if (currentTerm) return;

    // Only show skeletons on first load — keep existing listings visible during refresh
    if (!homeItems.length) {
      grid.innerHTML = Array(20).fill('<div class="skeleton"></div>').join('');
      grid2.innerHTML = '';
    }

    try {
      const res = await fetch('/api/listings');
      const data = await res.json();

      if (data.loading) {
        status.innerHTML = '';
        grid.innerHTML = `<div class="empty"><h2>⏳</h2><p>${data.message}</p></div>`;
        setTimeout(loadListings, 30000);
        return;
      }

      homeItems = data.items || [];

      if (data.lastUpdated) {
        const d = new Date(data.lastUpdated);
        const ago = Math.round((Date.now() - d) / 60000);
        const ts = ago < 2 ? 'just now' : `${ago}m ago`;
        document.getElementById('last-updated').textContent = `Updated ${ts}`;
        document.getElementById('footer-updated').textContent = `Last refreshed: ${d.toLocaleTimeString()}`;
      }

      renderHome();
    } catch {
      status.innerHTML = 'Error loading listings.';
      grid.innerHTML = `<div class="empty"><h2>😬</h2><p>Could not load listings. Is the server running?</p></div>`;
    }
  }

  function renderHome() {
    const status = document.getElementById('status-text');
    status.innerHTML = `A selection of the <strong>most liked</strong> listings on Vinted UK — 🔍 search a brand, item or category to find more`;
    if (!homeItems.length) {
      document.getElementById('grid').innerHTML = `<div class="empty"><h2>🤷</h2><p>No listings yet.</p></div>`;
      document.getElementById('grid2').innerHTML = '';
      return;
    }
    document.getElementById('grid').innerHTML = homeItems.slice(0, 100).map(cardHTML).join('');
    document.getElementById('grid2').innerHTML = '';
  }

  function setActiveChip(q) {
    document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.q === q));
  }

  function handleChipClick(e) {
    const chip = e.target.closest('.chip');
    if (!chip || !chip.dataset.q) return;
    e.preventDefault();
    const q = chip.dataset.q;
    const input = document.getElementById('search-input');
    input.value = q;
    clearTimeout(searchTimer);
    currentTerm = q;
    setActiveChip(q);
    runSearch(q);
  }
  document.getElementById('chips').addEventListener('click', handleChipClick);
  document.getElementById('chips-mobile').addEventListener('click', handleChipClick);

  async function runSearch(term) {
    const status = document.getElementById('status-text');
    const grid = document.getElementById('grid');
    const grid2 = document.getElementById('grid2');

    if (activeSearch) activeSearch.abort();
    const ctrl = new AbortController();
    activeSearch = ctrl;

    // GA search event
    if (typeof gtag !== 'undefined') gtag('event', 'search', { search_term: term });

    status.innerHTML = `🔍 Finding most-liked <strong>${esc(term)}</strong> listings on Vinted…`;
    grid.innerHTML = Array(20).fill('<div class="skeleton"></div>').join('');
    grid2.innerHTML = '';

    try {
      const res = await fetch(`/api/search?q=${encodeURIComponent(term)}`, { signal: ctrl.signal });
      const data = await res.json();
      if (ctrl.signal.aborted) return;

      const items = data.items || [];
      status.innerHTML = items.length
        ? `<strong>${items.length}</strong> results for <strong>${esc(term)}</strong> — sorted by most liked`
        : `No liked results for <strong>${esc(term)}</strong>. Try another brand or keyword.`;

      grid.innerHTML = items.slice(0, 100).map(cardHTML).join('');
      grid2.innerHTML = items.slice(100).map(cardHTML).join('');
    } catch (err) {
      if (err.name === 'AbortError') return;
      status.innerHTML = `Search failed — try again in a moment.`;
      grid.innerHTML = `<div class="empty"><h2>😬</h2><p>Search failed.</p></div>`;
    } finally {
      if (activeSearch === ctrl) activeSearch = null;
    }
  }

  function clearSearch() {
    currentTerm = '';
    if (activeSearch) { activeSearch.abort(); activeSearch = null; }
    setActiveChip(null);
    renderHome();
  }

  function cardHTML(item) {
    const photo = item.photo?.thumbnails?.find(t => t.type === 'thumb310x430')?.url || item.photo?.url || '';
    const price = item.price ? `£${parseFloat(item.price.amount).toFixed(2)}` : '';
    const totalPrice = item.total_item_price ? `£${parseFloat(item.total_item_price.amount).toFixed(2)} inc. fees` : '';
    const pills = [item.size_title, item.status].filter(Boolean).map(p => `<span class="pill">${esc(p)}</span>`).join('');
    return `<a class="card" href="${esc(item.url)}" target="_blank" rel="noopener noreferrer">
      <div class="card-img-wrap">
        ${photo ? `<img class="card-img" src="${esc(photo)}" alt="${esc(item.title || '')}" loading="lazy">` : ''}
        <span class="like-badge">❤️ ${item.favourite_count}</span>
      </div>
      <div class="card-body">
        ${item.brand_title ? `<div class="card-brand">${esc(item.brand_title)}</div>` : ''}
        <div class="card-title">${esc(item.title || '')}</div>
        ${pills ? `<div class="card-meta">${pills}</div>` : ''}
      </div>
      <div class="card-footer">
        <span class="price">${price}</span>
        <span class="total-price">${totalPrice}</span>
      </div>
    </a>`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    const val = e.target.value.trim();
    setActiveChip(null);
    if (!val) { clearSearch(); return; }
    searchTimer = setTimeout(() => {
      currentTerm = val;
      runSearch(currentTerm);
    }, 600);
  });

  loadListings();
  setInterval(() => { if (!currentTerm) loadListings(); }, 5 * 60 * 1000);
</script>
</body>
</html>
