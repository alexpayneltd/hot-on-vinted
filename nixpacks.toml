# Railway build config — installs Chrome's Linux dependencies
[phases.setup]
aptPkgs = [
  "libnss3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libasound2",
  "libpangocairo-1.0-0",
  "libpango-1.0-0",
  "libcairo2",
  "libx11-xcb1",
  "libxcb-dri3-0"
]

[phases.install]
cmds = ["npm ci"]

[start]
cmd = "node server.js"
